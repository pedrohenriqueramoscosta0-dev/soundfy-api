<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Soundfy</title>

<link rel="icon" type="image/png" href="logo.png">

<style>

body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#00aaff;
}

/* BACKGROUND */
body::before{
    content:"";
    position:fixed;
    inset:0;
    background:url("background.jpg") center/cover no-repeat;
    filter:blur(8px) brightness(0.4);
    z-index:-2;
}

/* APP */
.app{
    display:flex;
    height:calc(100vh - 110px);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:rgba(0,0,0,0.85);
    padding:15px;
    overflow-y:auto;
}

button{
    cursor:pointer;
    border:none;
    border-radius:10px;
    padding:10px;
    margin:5px 0;
    background:#00aaff;
    color:white;
}

.playlist-btn{
    width:100%;
    background:rgba(0,170,255,0.1);
    border:1px solid #00aaff;
}

/* CONTENT */
.content{
    flex:1;
    padding:20px;
    overflow-y:auto;
}

/* VINIL */
#capa{
    width:260px;
    height:260px;
    object-fit:cover;
    border-radius:50%;
    margin-top:20px;
    border:6px solid #111;
    box-shadow:0 0 25px rgba(0,170,255,0.4);
}

.rotate{
    animation:spin 5s linear infinite;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

/* PLAYER */
.player{
    position:fixed;
    bottom:0;
    left:0;
    right:0;
    height:110px;
    background:rgba(0,0,0,0.9);
    border-top:1px solid #00aaff;
    display:flex;
    flex-direction:column;
    justify-content:center;
    gap:6px;
    padding:10px;
}

.controls{
    display:flex;
    justify-content:center;
    gap:10px;
}

/* SEARCH */
#search{
    width:100%;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    border:none;
}

/* GRID HOME */
#homeGrid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
    gap:15px;
    margin-top:20px;
}

.card{
    background:rgba(0,170,255,0.08);
    border:1px solid rgba(0,170,255,0.3);
    border-radius:12px;
    padding:10px;
    cursor:pointer;
    transition:0.2s;
    text-align:center;
}

.card:hover{
    transform:scale(1.05);
    background:rgba(0,170,255,0.15);
}

.card img{
    width:100%;
    border-radius:10px;
}

/* SEARCH LIST */
#musicList{
    list-style:none;
    padding:0;
    margin:0;
    display:none;
}

#musicList li{
    padding:8px;
    cursor:pointer;
}

#musicList li:hover{
    background:rgba(0,170,255,0.2);
}

#timeInfo{
    font-size:14px;
    color:#ccc;
    min-width:90px;
    text-align:center;
}

/* RESPONSIVO */
@media (max-width:768px){
    .sidebar{
        display:none;
    }

    .content{
        width:100%;
        padding:10px;
    }

    #homeGrid{
        grid-template-columns:repeat(2,1fr);
    }

    #capa{
        width:180px;
        height:180px;
    }
}

</style>
</head>

<body>

<div class="app">

<div class="sidebar">

<button onclick="showHome()">🏠 Home</button>

<input id="search" placeholder="Pesquisar música...">
<ul id="musicList"></ul>

</div>

<div class="content">

<h2 id="title">Home</h2>

<img id="capa" src="logo.png">

<div id="homeGrid"></div>

<audio id="player"></audio>

</div>

</div>

<!-- PLAYER -->
<div class="player">

<div id="info">Nada a tocar</div>

<div class="controls">
<button onclick="prev()">⏮</button>
<button onclick="playPause()" id="playBtn">▶</button>
<button onclick="next()">⏭</button>
</div>

<div>
🔊 <input type="range" id="volume" min="0" max="1" step="0.01">
</div>

<div style="display:flex;align-items:center;gap:10px;">
    <span id="timeInfo">0:00 / 0:00</span>
    <input type="range" id="progress" min="0" max="100" style="flex:1;">
</div>

</div>

<script>

/* MUSICAS (VINDO DO SERVIDOR) */
let musicas = [];

let index = 0;
let music = null;

/* ELEMENTS */
const audio = document.getElementById("player");
const capa = document.getElementById("capa");
const info = document.getElementById("info");
const volume = document.getElementById("volume");
const progress = document.getElementById("progress");
const grid = document.getElementById("homeGrid");
const timeInfo = document.getElementById("timeInfo");

const search = document.getElementById("search");
const list = document.getElementById("musicList");

/* LOAD MUSICAS */
fetch("/musicas")
  .then(res => res.json())
  .then(data => {
    musicas = data;
    renderHome();
  });

/* FORMAT TIME */
function formatTime(seconds){
 if(isNaN(seconds)) return "0:00";
 const min = Math.floor(seconds/60);
 const sec = Math.floor(seconds%60);
 return min + ":" + String(sec).padStart(2,"0");
}

/* HOME */
function showHome(){
 document.getElementById("title").innerText = "Home";
 renderHome();
}

function renderHome(){
 grid.innerHTML = "";

 musicas.forEach((m,i)=>{
  const card = document.createElement("div");
  card.className = "card";

  card.innerHTML = `
    <img src="${m.cover}">
    <p>${m.title}</p>
  `;

  card.onclick = ()=>{
    index = i;
    play(m);
  };

  grid.appendChild(card);
 });
}

/* PLAY */
function play(m){
 music = m || musicas[index];

 if(!music) return;

 audio.src = music.audio;
 capa.src = music.cover;
 info.textContent = music.title;

 audio.play();

 capa.classList.add("rotate");
}

/* NEXT */
function next(){
 index++;
 if(index >= musicas.length) index = 0;
 play(musicas[index]);
}

/* PREV */
function prev(){
 index--;
 if(index < 0) index = musicas.length - 1;
 play(musicas[index]);
}

/* PLAY/PAUSE */
function playPause(){
 if(!audio.src) play(musicas[index]);
 else audio.paused ? audio.play() : audio.pause();
}

/* UI */
audio.onplay = ()=>{
 document.getElementById("playBtn").innerText = "⏸";
 capa.classList.add("rotate");
 info.innerText = music.title;
};

audio.onpause = ()=>{
 document.getElementById("playBtn").innerText = "▶";
 capa.classList.remove("rotate");
};

/* VOLUME */
volume.oninput = ()=> audio.volume = volume.value;

/* PROGRESS */
audio.ontimeupdate = ()=>{
 if(audio.duration){
  progress.value = (audio.currentTime/audio.duration)*100;

  timeInfo.textContent =
   formatTime(audio.currentTime) +
   " / " +
   formatTime(audio.duration);
 }
};

progress.oninput = ()=>{
 audio.currentTime = (progress.value/100)*audio.duration;
};

audio.onended = next;

/* SEARCH */
search.addEventListener("input", ()=>{
 const f = search.value.toLowerCase();

 list.innerHTML = "";

 if(!f){
  list.style.display = "none";
  return;
 }

 musicas.forEach((m,i)=>{
  if(m.title.toLowerCase().includes(f)){
   const li = document.createElement("li");
   li.textContent = m.title;

   li.onclick = ()=>{
    index = i;
    play(m);
   };

   list.appendChild(li);
  }
 });

 list.style.display = "block";
});

/* INIT */
showHome();

</script>

</body>
</html>
